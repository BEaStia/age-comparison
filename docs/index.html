<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Power Age</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --panel-alt: #f9fafb;
        --text: #16202b;
        --muted: #5b6775;
        --line: #d9e0e8;
        --accent: #0f766e;
        --accent-2: #8a5a00;
        --accent-soft: rgba(15, 118, 110, 0.1);
        --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      header,
      main,
      footer {
        width: min(1240px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        padding: 28px 0 18px;
      }

      .hero {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff 0%, #fbfcfd 100%);
        box-shadow: var(--shadow);
        padding: 22px;
      }

      .hero-top {
        display: flex;
        gap: 16px;
        align-items: flex-start;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .lead {
        max-width: 920px;
        margin: 0;
        color: var(--muted);
        font-size: 17px;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .controls-block {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .controls-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .toggle {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        padding: 8px 12px;
        font: inherit;
        cursor: pointer;
      }

      .toggle[aria-pressed="true"] {
        border-color: var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 18px;
      }

      .meta span,
      .pill,
      .nav-link {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        padding: 5px 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 18px 0 0;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--text);
      }

      main {
        padding: 6px 0 28px;
      }

      section {
        margin: 18px 0 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .section-head {
        padding: 18px 18px 0;
      }

      h2 {
        margin: 0 0 8px;
        font-size: 23px;
        line-height: 1.15;
      }

      .section-note {
        margin: 0;
        color: var(--muted);
        max-width: 1050px;
      }

      .content {
        padding: 18px;
      }

      .summary-grid,
      .signal-grid,
      .period-grid,
      .figure-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .summary-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .summary-card,
      .signal-card,
      .period-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-alt);
        padding: 14px;
        min-width: 0;
      }

      .summary-card strong,
      .signal-card strong,
      .period-card strong,
      .figure-caption strong {
        display: block;
        margin-bottom: 6px;
      }

      .summary-card .value {
        font-size: 26px;
        line-height: 1;
        margin-top: 6px;
      }

      .summary-card .label,
      .signal-card .label,
      .period-card .label,
      .figure-caption span,
      .table-note,
      .small-note,
      .caption-muted {
        color: var(--muted);
        font-size: 14px;
      }

      .figure-grid {
        margin-top: 14px;
      }

      figure {
        margin: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: hidden;
        background: var(--panel);
      }

      figure.wide {
        grid-column: 1 / -1;
      }

      .figure-trigger {
        display: block;
        width: 100%;
        border: 0;
        padding: 0;
        background: transparent;
        cursor: zoom-in;
      }

      .figure-trigger img {
        display: block;
        width: 100%;
        height: auto;
        background: #fff;
      }

      .figure-caption {
        padding: 12px 14px 14px;
        border-top: 1px solid var(--line);
      }

      .figure-caption span {
        display: block;
      }

      .correlation-list {
        display: grid;
        gap: 10px;
      }

      .correlation-item {
        border-left: 3px solid var(--accent);
        background: var(--panel-alt);
        padding: 12px 14px;
        border-radius: 6px;
      }

      .crosstab-toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .crosstab-table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 900px;
        background: #fff;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        border-right: 1px solid var(--line);
        padding: 8px 10px;
        text-align: center;
        vertical-align: middle;
        font-size: 13px;
      }

      thead th {
        position: sticky;
        top: 0;
        background: #f9fbfc;
        z-index: 1;
      }

      tbody th {
        position: sticky;
        left: 0;
        background: #f9fbfc;
        text-align: left;
        z-index: 1;
      }

      td.total,
      th.total {
        background: #f5f7fa;
        font-weight: 600;
      }

      td.heat {
        color: #0d1b24;
      }

      .section-anchor {
        scroll-margin-top: 20px;
      }

      footer {
        padding: 0 0 34px;
        color: var(--muted);
      }

      .footer-inner {
        border-top: 1px solid var(--line);
        padding-top: 18px;
      }

      .dialog {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(11, 18, 29, 0.72);
        z-index: 1000;
      }

      .dialog[aria-hidden="false"] {
        display: flex;
      }

      .dialog-panel {
        width: min(1180px, 100%);
        max-height: 100%;
        overflow: auto;
        background: #fff;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
      }

      .dialog-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }

      .dialog-head strong {
        min-width: 0;
      }

      .dialog-close {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        font: inherit;
        cursor: pointer;
        padding: 6px 10px;
      }

      .dialog-body img {
        display: block;
        width: 100%;
        height: auto;
      }

      .dialog-caption {
        padding: 12px 14px 16px;
        color: var(--muted);
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 980px) {
        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .signal-grid,
        .period-grid,
        .figure-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        header,
        main,
        footer {
          width: min(100%, calc(100% - 18px));
        }

        .hero,
        .section-head,
        .content {
          padding-left: 14px;
          padding-right: 14px;
        }

        .summary-grid {
          grid-template-columns: 1fr;
        }

        table {
          min-width: 760px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="hero">
        <div class="hero-top">
          <div>
            <h1 id="page-title">Power Age</h1>
            <p class="lead" id="page-lead">
              Исследовательский прототип о возрасте элиты, фракциях и событиях в
              России и СССР. Страница собирает графики, корреляционные выводы,
              кросс-табы и событийный слой в одном месте.
            </p>
          </div>
          <div class="controls" id="controls"></div>
        </div>
        <div class="meta" id="meta"></div>
        <nav class="nav" id="nav"></nav>
      </div>
    </header>

    <main id="app" aria-live="polite"></main>

    <footer>
      <div class="footer-inner" id="footer"></div>
    </footer>

    <div class="dialog" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true">
      <div class="dialog-panel" role="document">
        <div class="dialog-head">
          <strong id="lightbox-title">Figure</strong>
          <button class="dialog-close" type="button" data-lightbox-close>Close</button>
        </div>
        <div class="dialog-body">
          <img id="lightbox-image" alt="">
        </div>
        <div class="dialog-caption" id="lightbox-caption"></div>
      </div>
    </div>

    <noscript>
      <main style="width:min(1240px, calc(100% - 32px)); margin:0 auto; padding:20px 0;">
        This site needs JavaScript to render the language switcher, event navigation,
        cross-tabs, and image lightbox.
      </main>
    </noscript>

    <script src="app.js" defer></script>
  </body>
</html>
